services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: cos-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./data/qdrant:/qdrant/storage
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: cos-postgres
    environment:
      POSTGRES_USER: cos
      POSTGRES_PASSWORD: cos_local_dev
      POSTGRES_DB: chief_of_staff
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    restart: unless-stopped

  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: cos-litellm
    ports:
      - "4000:4000"
    volumes:
      - ./litellm_config.yaml:/app/config.yaml
    command: --config /app/config.yaml --port 4000 --host 0.0.0.0
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: cos-webui
    ports:
      - "3000:8080"
    environment:
      OPENAI_API_BASE_URL: http://litellm:4000
      OPENAI_API_KEY: sk-cos-local-dev
      WEBUI_NAME: Chief of Staff
    volumes:
      - ./data/webui:/app/backend/data
    depends_on:
      - litellm
    restart: unless-stopped