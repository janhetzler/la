# LiteLLM Config — Local Agent
# Genutzt in: Sandbox und Docker (identischer Stack)

model_list:
  - model_name: granite-tiny
    litellm_params:
      model: openai/granite
      api_base: http://127.0.0.1:8080/v1
      api_key: not-needed

  - model_name: granite-embed
    litellm_params:
      model: openai/granite-embed
      api_base: http://127.0.0.1:8081/v1
      api_key: not-needed

  - model_name: agent-local
    litellm_params:
      model: openai/agent-local
      api_base: http://127.0.0.1:8002/v1
      api_key: not-needed
    model_info:
      description: "Local Agent — orchestrator, routes to the right specialist"

general_settings:
  master_key: sk-cos-local-dev
  store_model_in_db: false

litellm_settings:
  drop_params: true
  set_verbose: false
  success_callback: ["arize_phoenix"]
  failure_callback: ["arize_phoenix"]
