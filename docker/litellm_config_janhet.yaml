# LiteLLM Config für janhet
# Headroom als nativer Guardrail (pre_call Kompression)

model_list:
  - model_name: granite-tiny
    litellm_params:
      model: openai/granite
      api_base: http://127.0.0.1:8080/v1
      api_key: not-needed

  - model_name: granite-embed
    litellm_params:
      model: openai/granite-embed
      api_base: http://127.0.0.1:8081/v1
      api_key: not-needed

# Headroom als LiteLLM Guardrail
guardrails:
  - guardrail_name: headroom-compression
    litellm_params:
      guardrail: headroom
      mode: pre_call
      api_base: http://127.0.0.1:8787
      default_on: true

general_settings:
  master_key: sk-cos-local-dev
  store_model_in_db: false

litellm_settings:
  drop_params: true
  set_verbose: false
  success_callback: ["arize_phoenix"]
  failure_callback: ["arize_phoenix"]
