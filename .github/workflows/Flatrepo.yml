name: Repository Flattener

on:
  workflow_dispatch: # Erlaubt das manuelle Ausführen im GitHub-Tab "Actions"
  push:
    branches: [ main, master ] # Automatisch bei Push ausführen

jobs:
  flatten:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Dateien mit Python zusammenführen
        run: |
          python3 -c '
          import os

          output_file = "repository_flattened.txt"
          ignored_dirs = {".git", "node_modules", "venv", ".idea", ".vscode", "__pycache__"}
          ignored_exts = {".png", ".jpg", ".jpeg", ".gif", ".zip", ".tar", ".gz", ".pdf", ".ico", ".exe"}

          with open(output_file, "w", encoding="utf-8", errors="ignore") as out:
              out.write("================================================================\n")
              out.write("Repository Inhalt\n")
              out.write("================================================================\n\n")

              for root, dirs, files in os.walk("."):
                  # Ignorierte Ordner überspringen
                  dirs[:] = [d for d in dirs if d not in ignored_dirs]
                  
                  for file in files:
                      if file == output_file or any(file.endswith(ext) for ext in ignored_exts):
                          continue
                      
                      file_path = os.path.join(root, file)
                      rel_path = os.path.relpath(file_path, ".")

                      out.write("================================================================\n")
                      out.write(f"File: {rel_path}\n")
                      out.write("================================================================\n")
                      out.write("```\n")

                      try:
                          with open(file_path, "r", encoding="utf-8", errors="ignore") as f:
                              out.write(f.read())
                      except Exception as e:
                          out.write(f"[Fehler beim Lesen: {e}]\n")

                      out.write("\n```\n\n")
          '

      - name: Datei als Artifact bereitstellen
        uses: actions/upload-artifact@v4
        with:
          name: repo-flattened-txt
          path: repository_flattened.txt
